
<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jana & Jonas – Save the Date</title>
  <link rel="preconnect" href="[fonts.googleapis.com](https://fonts.googleapis.com)" />
  <link rel="preconnect" href="[fonts.gstatic.com](https://fonts.gstatic.com)" crossorigin />
  <link href="[fonts.googleapis.com](https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=Libre+Baskerville:ital@0;1&display=swap)" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ═══════════════════════════════════════════
       VIDEO SECTION
  ═══════════════════════════════════════════ -->
  <section class="video-section" id="videoSection">
    <div class="video-wrapper" id="videoWrapper">

      <!-- Video Element -->
      <video
        id="weddingVideo"
        autoplay
        muted
        playsinline
        preload="auto"
      >
        <source src="./video/wedding.mp4" type="video/mp4" />
        Dein Browser unterstützt kein HTML5-Video.
      </video>

      <!-- Final Frame Overlay (shown after video ends) -->
      <div class="final-frame" id="finalFrame">
        <div class="final-frame-inner">
          <div class="final-frame-line"></div>
          <p class="final-frame-label">SAVE THE DATE</p>
          <h2 class="final-frame-date">11. September 2027</h2>
          <div class="final-frame-line"></div>
          <p class="final-frame-names">Jana & Jonas</p>
	  <p class="final-frame-info">Weitere Info´s folgen.</p>
        </div>
      </div>

      <!-- Replay Hint -->
      <div class="replay-hint" id="replayHint">
        <div class="replay-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
            <path d="M3 3v5h5"/>
          </svg>
        </div>
        <span>Nochmal abspielen</span>
      </div>

    </div>
  </section>

  <script src="script.js"></script>
</body>
</html>
